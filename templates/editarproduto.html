<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Produto</title>

<link rel="stylesheet" href="/static/css/editar.css">

</head>
<body>

<div class="container">

    <h1>Editar Produto</h1>

    <form action="/update/{{ produto[0] }}" method="POST">

        <label>Nome do Produto</label>

        <input
            type="text"
            name="produto"
            value="{{ produto[1] }}"
            required
        >

        <label>Preço</label>

        <input
            type="number"
            step="0.01"
            name="preco"
            value="{{ produto[2] }}"
            required
        >

        <label>Quantidade</label>

        <input
            type="number"
            name="quantidade"
            value="{{ produto[3] }}"
            required
        >

        <label>Categoria</label>

        <input
            type="text"
            name="categoria"
            value="{{ produto[4] }}"
            required
        >

        <button type="submit">
            Salvar Alterações
        </button>

    </form>

</div>

</body>
</html>
